<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuoteChat iPhone — Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505; --surface:#0c0c0c; --border:rgba(255,255,255,0.09);
    --text:#f2f2f0; --text-dim:#8b8b88;
    --mono:'JetBrains Mono',monospace; --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
  .streak{position:fixed;border-radius:50%;background:radial-gradient(ellipse at center,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0) 70%);filter:blur(40px);pointer-events:none;z-index:0;}
  .streak.s1{width:800px;height:120px;top:-50px;left:-260px;transform:rotate(18deg);animation:drift1 26s ease-in-out infinite;}
  .streak.s2{width:600px;height:90px;bottom:6%;right:-240px;transform:rotate(-20deg);animation:drift2 30s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0) rotate(18deg);}50%{transform:translate(50px,30px) rotate(22deg);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) rotate(-20deg);}50%{transform:translate(-40px,-20px) rotate(-16deg);}}
  main{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 18px 48px;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .back{font-family:var(--mono);font-size:12px;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:7px 11px;}
  .back:active{border-color:rgba(255,255,255,0.25);}
  h1{font-family:var(--serif);font-weight:500;font-size:24px;margin-bottom:4px;}
  .sub{font-size:13px;color:var(--text-dim);margin-bottom:22px;}
  #imgWrap{width:100%;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#000;min-height:120px;display:flex;align-items:center;justify-content:center;}
  #imgWrap img{width:100%;display:block;}
  #imgWrap .placeholder{font-family:var(--mono);font-size:12px;color:var(--text-dim);padding:40px 0;}
  .controls{margin-top:18px;}
  label{display:block;font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:0.03em;margin-bottom:6px;margin-top:14px;}
  label:first-child{margin-top:0;}
  input[type=text]{width:100%;padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-family:var(--sans);}
  input[type=text]:focus{outline:none;border-color:rgba(255,255,255,0.35);}
  button#gen{width:100%;margin-top:18px;padding:15px;border:1px solid var(--text);border-radius:10px;background:var(--text);color:#000;font-size:14px;font-family:var(--mono);letter-spacing:0.04em;text-transform:uppercase;font-weight:600;cursor:pointer;}
  button#gen:active{opacity:0.8;}
  button#dl{width:100%;margin-top:10px;padding:15px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text);font-size:14px;font-family:var(--mono);letter-spacing:0.04em;text-transform:uppercase;font-weight:600;cursor:pointer;}
  button#dl:active{border-color:rgba(255,255,255,0.25);}
</style>
</head>
<body>

  <div class="streak s1"></div>
  <div class="streak s2"></div>

  <main>
    <div class="topbar"><a class="back" onclick="location.replace('index.html')">⇱ kembali</a></div>
    <h1>QuoteChat iPhone</h1>
    <p class="sub">Generate quote chat bergaya iMessage.</p>

    <div id="imgWrap"><div class="placeholder">Fill to generate image</div></div>

    <div class="controls">
      <label>Teks</label>
      <input type="text" id="text" placeholder="Text">
      <label>Jam Chat</label>
      <input type="text" id="chatTime" placeholder="00.00">
      <label>Jam Status Bar</label>
      <input type="text" id="statusBarTime" placeholder="01.00">
      <button id="gen">֍ Generate</button>
      <button id="dl" style="display:none;">⇩ Download Gambar</button>
    </div>
  </main>

<script>
let currentImgUrl = "";

document.getElementById('gen').addEventListener('click', () => {
  const text = document.getElementById('text').value;
  const chatTime = document.getElementById('chatTime').value;
  const statusBarTime = document.getElementById('statusBarTime').value;

  currentImgUrl = `https://api.ikyyxd.my.id/canvas/iqc?text=${encodeURIComponent(text)}&chatTime=${encodeURIComponent(chatTime)}&statusBarTime=${encodeURIComponent(statusBarTime)}`;

  document.getElementById('imgWrap').innerHTML = `<img src="${currentImgUrl}">`;
  document.getElementById('dl').style.display = 'block';
});

document.getElementById('dl').addEventListener('click', async () => {
  if (!currentImgUrl) return;
  try {
    const res = await fetch(currentImgUrl);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'quotechat.jpg';
    link.href = blobUrl;
    link.click();
    URL.revokeObjectURL(blobUrl);
  } catch (err) {
    alert('Gagal download: ' + err.message);
  }
});
</script>
</body>
</html>
