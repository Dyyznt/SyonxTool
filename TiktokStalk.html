<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Stalker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400..600&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050505;
    color: #f2f2f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* glow streaks */
  .streak {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.10), transparent 70%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
  }
  .streak-1 {
    width: 800px; height: 120px;
    top: 8%; left: -10%;
    transform: rotate(18deg);
    animation: drift1 26s ease-in-out infinite;
  }
  .streak-2 {
    width: 600px; height: 90px;
    bottom: 10%; right: -15%;
    transform: rotate(-20deg);
    animation: drift2 30s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%, 100% { transform: translate(0,0) rotate(18deg); }
    50% { transform: translate(30px, 20px) rotate(18deg); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0,0) rotate(-20deg); }
    50% { transform: translate(-25px, -15px) rotate(-20deg); }
  }

  .app {
    width: 100%;
    max-width: 480px;
    padding: 20px 18px 40px;
    position: relative;
    z-index: 1;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 22px;
  }
  .back-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: transparent;
    color: #f2f2f0;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.2); }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 24px;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #8b8b88;
    margin-bottom: 20px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }
  .search-input {
    flex: 1;
    min-height: 44px;
    background: #0c0c0c;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    color: #f2f2f0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 0 14px;
  }
  .search-input:focus {
    outline: none;
    border-color: rgba(255,255,255,0.25);
  }
  .search-input::placeholder { color: #8b8b88; }

  .go-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: #ffffff;
    color: #111111;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    cursor: pointer;
    font-weight: 600;
  }
  .go-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .go-btn:hover:not(:disabled) { background: #e8e8e6; }

  .status-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8b8b88;
    margin-bottom: 14px;
    min-height: 16px;
  }
  .status-msg.error { color: #ff6b6b; }

  .card {
    background: #0c0c0c;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    padding: 22px 18px;
    display: none;
  }
  .card.show { display: block; }

  .profile-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .avatar {
    width: 74px; height: 74px;
    border-radius: 18px;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.09);
    background: #050505;
  }
  .name-block .nickname {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .verified-badge {
    color: #4fc3f7;
    font-size: 14px;
  }
  .name-block .username {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8b8b88;
    margin-top: 2px;
  }
  .private-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #8b8b88;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 6px;
    padding: 2px 6px;
    margin-top: 6px;
  }

  .bio {
    font-size: 13px;
    color: #f2f2f0;
    line-height: 1.5;
    margin-bottom: 18px;
    white-space: pre-wrap;
  }
  .bio.empty { color: #8b8b88; font-style: italic; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat {
    background: #050505;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
  }
  .stat .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
  }
  .stat .label {
    font-size: 10px;
    color: #8b8b88;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #8b8b88;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.09);
  }

  .loader {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8b8b88;
    margin-bottom: 14px;
  }
  .loader.show { display: flex; }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #f2f2f0;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="streak streak-1"></div>
<div class="streak streak-2"></div>

<div class="app">
  <div class="topbar">
    <button class="back-btn" onclick="location.replace('index.html')">⇱ Back</button>
  </div>

  <h1>TikTok Stalker</h1>
  <p class="subtitle">Cek profil publik TikTok — bio, followers, foto.</p>

  <div class="search-row">
    <input type="text" id="usernameInput" class="search-input" placeholder="username (tanpa @)" />
    <button class="go-btn" id="goBtn" onclick="stalk()">Cari</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>Fetching data...</span>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="card" id="resultCard">
    <div class="profile-head">
      <img class="avatar" id="avatarImg" src="" alt="avatar" />
      <div class="name-block">
        <div class="nickname" id="nickname"></div>
        <div class="username" id="username"></div>
        <div class="private-tag" id="privateTag" style="display:none;">Private Account</div>
      </div>
    </div>

    <div class="bio" id="bio"></div>

    <div class="stats">
      <div class="stat"><div class="value" id="statFollowers">-</div><div class="label">Followers</div></div>
      <div class="stat"><div class="value" id="statFollowing">-</div><div class="label">Following</div></div>
      <div class="stat"><div class="value" id="statLikes">-</div><div class="label">Likes</div></div>
      <div class="stat"><div class="value" id="statVideos">-</div><div class="label">Videos</div></div>
    </div>

    <div class="meta-row">
      <span id="createTime"></span>
      <span id="userId"></span>
    </div>
  </div>
</div>

<script>
  const API_BASE = "https://api.ikyyxd.my.id/stalk/tiktok?username=";

  function formatNum(n) {
    if (n === null || n === undefined) return "-";
    if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
    return String(n);
  }

  function formatDate(iso) {
    if (!iso) return "-";
    const d = new Date(iso);
    return d.toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  async function stalk() {
    const input = document.getElementById('usernameInput');
    const goBtn = document.getElementById('goBtn');
    const loader = document.getElementById('loader');
    const statusMsg = document.getElementById('statusMsg');
    const card = document.getElementById('resultCard');

    let username = input.value.trim().replace(/^@/, '');
    if (!username) {
      statusMsg.textContent = "Isi username dulu bro.";
      statusMsg.classList.add('error');
      return;
    }

    goBtn.disabled = true;
    loader.classList.add('show');
    statusMsg.textContent = "";
    statusMsg.classList.remove('error');
    card.classList.remove('show');

    try {
      const res = await fetch(API_BASE + encodeURIComponent('@' + username));
      const data = await res.json();

      if (!data.status || !data.result) {
        statusMsg.textContent = data.message || "User ga ketemu / API error.";
        statusMsg.classList.add('error');
        return;
      }

      const r = data.result;

      document.getElementById('avatarImg').src = r.avatar?.medium || r.avatar?.thumb || '';
      document.getElementById('nickname').innerHTML = r.nickname + (r.verified ? ' <span class="verified-badge">&#10003;</span>' : '');
      document.getElementById('username').textContent = '@' + r.uniqueId;
      document.getElementById('privateTag').style.display = r.privateAccount ? 'inline-block' : 'none';

      const bioEl = document.getElementById('bio');
      if (r.signature) {
        bioEl.textContent = r.signature;
        bioEl.classList.remove('empty');
      } else {
        bioEl.textContent = "Ga ada bio.";
        bioEl.classList.add('empty');
      }

      document.getElementById('statFollowers').textContent = formatNum(r.stats?.followers);
      document.getElementById('statFollowing').textContent = formatNum(r.stats?.following);
      document.getElementById('statLikes').textContent = formatNum(r.stats?.likes);
      document.getElementById('statVideos').textContent = formatNum(r.stats?.videos);

      document.getElementById('createTime').textContent = "Joined " + formatDate(r.createTime);
      document.getElementById('userId').textContent = "ID: " + (r.id || '-');

      card.classList.add('show');
      statusMsg.textContent = "";
    } catch (err) {
      statusMsg.textContent = "Gagal fetch: " + err.message;
      statusMsg.classList.add('error');
    } finally {
      goBtn.disabled = false;
      loader.classList.remove('show');
    }
  }

  document.getElementById('usernameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') stalk();
  });
</script>

</body>
</html>
