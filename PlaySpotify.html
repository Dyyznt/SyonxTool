<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400..600&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050505;
    color: #f2f2f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  .streak {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.10), transparent 70%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
  }
  .streak-1 {
    width: 800px; height: 120px;
    top: 8%; left: -10%;
    transform: rotate(18deg);
    animation: drift1 26s ease-in-out infinite;
  }
  .streak-2 {
    width: 600px; height: 90px;
    bottom: 10%; right: -15%;
    transform: rotate(-20deg);
    animation: drift2 30s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%, 100% { transform: translate(0,0) rotate(18deg); }
    50% { transform: translate(30px, 20px) rotate(18deg); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0,0) rotate(-20deg); }
    50% { transform: translate(-25px, -15px) rotate(-20deg); }
  }

  .app {
    width: 100%;
    max-width: 480px;
    padding: 20px 18px 40px;
    position: relative;
    z-index: 1;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 22px;
  }
  .back-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: transparent;
    color: #f2f2f0;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.2); }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 24px;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #8b8b88;
    margin-bottom: 20px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-input {
    flex: 1;
    min-height: 44px;
    background: #0c0c0c;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    color: #f2f2f0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 0 14px;
  }
  .search-input:focus {
    outline: none;
    border-color: rgba(255,255,255,0.25);
  }
  .search-input::placeholder { color: #8b8b88; }

  .go-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: #ffffff;
    color: #111111;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    cursor: pointer;
    font-weight: 600;
  }
  .go-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .go-btn:hover:not(:disabled) { background: #e8e8e6; }

  .loader {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8b8b88;
    margin-bottom: 14px;
  }
  .loader.show { display: flex; }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #f2f2f0;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #ff6b6b;
    margin-bottom: 14px;
    min-height: 16px;
  }

  .card {
    background: #0c0c0c;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    padding: 18px;
    display: none;
  }
  .card.show { display: block; }

  .track-head {
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
  }
  .thumb {
    width: 84px; height: 84px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.09);
    background: #050505;
    flex-shrink: 0;
  }
  .track-info .title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 17px;
    line-height: 1.3;
  }
  .track-info .artist {
    font-size: 13px;
    color: #8b8b88;
    margin-top: 4px;
  }
  .track-info .album {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #8b8b88;
    margin-top: 8px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #8b8b88;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.09);
  }

  .actions {
    display: flex;
    gap: 8px;
  }
  .action-link {
    flex: 1;
    text-align: center;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-radius: 10px;
    padding: 12px 0;
    font-weight: 600;
  }
  .action-link.primary {
    background: #ffffff;
    color: #111111;
  }
  .action-link.primary:hover { background: #e8e8e6; }
  .action-link.secondary {
    background: transparent;
    color: #f2f2f0;
    border: 1px solid rgba(255,255,255,0.09);
  }
  .action-link.secondary:hover { border-color: rgba(255,255,255,0.25); }

  .cancel-btn {
    width: 100%;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: transparent;
    color: #ff6b6b;
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 10px;
    padding: 11px 0;
    cursor: pointer;
  }
  .cancel-btn:hover { border-color: #ff6b6b; }
</style>
</head>
<body>

<div class="streak streak-1"></div>
<div class="streak streak-2"></div>

<div class="app">
  <div class="topbar">
    <button class="back-btn" onclick="location.replace(document.referrer || '/')">⇱ Back</button>
  </div>

  <h1>Spotify Finder</h1>
  <p class="subtitle">Cari lagu, dapatkan tautan Spotify, dan unduh.</p>

  <div class="search-row">
    <input type="text" id="queryInput" class="search-input" placeholder="Judul lagu atau nama artis..." />
    <button class="go-btn" id="goBtn" onclick="searchTrack()">Cari</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>Searching...</span>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="card" id="resultCard">
    <div class="track-head">
      <img class="thumb" id="thumbImg" src="" alt="thumbnail" />
      <div class="track-info">
        <div class="title" id="trackTitle"></div>
        <div class="artist" id="trackArtist"></div>
        <div class="album" id="trackAlbum"></div>
      </div>
    </div>

    <div class="meta-row">
      <span id="trackDuration"></span>
      <span id="trackRelease"></span>
    </div>

    <div class="actions">
      <a class="action-link primary" id="downloadLink" href="#" onclick="return forceDownload(event)">Download</a>
      <a class="action-link secondary" id="spotifyLink" href="#" target="_blank" rel="noopener">Buka di Spotify</a>
    </div>
    <button class="cancel-btn" id="cancelBtn" onclick="cancelDownload()" style="display:none;">Batal Download</button>
  </div>
</div>

<script>
  const API_BASE = "https://api.ikyyxd.my.id/search/spotifyplay?query=";
  let currentDownloadUrl = '';
  let currentTrackName = 'track';
  const PROXIES = [
    (u) => u,
    (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
    (u) => "https://corsproxy.io/?url=" + encodeURIComponent(u),
    (u) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u)
  ];

  async function fetchWithFallback(url) {
    let lastErr;
    for (const wrap of PROXIES) {
      try {
        const res = await fetch(wrap(url));
        if (!res.ok) throw new Error("status " + res.status);
        return await res.json();
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr;
  }

  async function searchTrack() {
    const input = document.getElementById('queryInput');
    const goBtn = document.getElementById('goBtn');
    const loader = document.getElementById('loader');
    const statusMsg = document.getElementById('statusMsg');
    const card = document.getElementById('resultCard');

    const query = input.value.trim();
    if (!query) {
      statusMsg.textContent = "Silakan isi judul lagu terlebih dahulu.";
      return;
    }

    goBtn.disabled = true;
    loader.classList.add('show');
    statusMsg.textContent = "";
    card.classList.remove('show');

    try {
      const data = await fetchWithFallback(API_BASE + encodeURIComponent(query));

      if (!data.status || !data.result) {
        statusMsg.textContent = data.message || "Lagu tidak ditemukan.";
        return;
      }

      const r = data.result;

      document.getElementById('thumbImg').src = r.thumbnail || '';
      document.getElementById('trackTitle').textContent = r.title || '-';
      document.getElementById('trackArtist').textContent = r.artist || '-';
      document.getElementById('trackAlbum').textContent = "Album: " + (r.album || '-');
      document.getElementById('trackDuration').textContent = "Durasi: " + (r.duration || '-');
      document.getElementById('trackRelease').textContent = "Rilis: " + (r.release_date && r.release_date !== 'N/A' ? r.release_date : '-');

      const dlLink = document.getElementById('downloadLink');
      const spLink = document.getElementById('spotifyLink');
      currentDownloadUrl = r.download || '';
      currentTrackName = (r.title || 'track').replace(/[^a-z0-9 _-]/gi, '');
      dlLink.style.display = r.download ? 'block' : 'none';
      spLink.href = r.url || '#';

      card.classList.add('show');
    } catch (err) {
      statusMsg.textContent = "Gagal memuat data: " + err.message;
    } finally {
      goBtn.disabled = false;
      loader.classList.remove('show');
    }
  }

  document.getElementById('queryInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchTrack();
  });

  let currentAbortController = null;

  async function forceDownload(e) {
    e.preventDefault();
    const statusMsg = document.getElementById('statusMsg');
    const dlLink = document.getElementById('downloadLink');
    const cancelBtn = document.getElementById('cancelBtn');
    if (!currentDownloadUrl) return false;

    const originalText = dlLink.textContent;
    dlLink.textContent = 'Mengunduh...';
    statusMsg.textContent = '';
    cancelBtn.style.display = 'block';
    currentAbortController = new AbortController();
    const signal = currentAbortController.signal;

    try {
      let blob;
      try {
        const res = await fetch(currentDownloadUrl, { signal });
        if (!res.ok) throw new Error('status ' + res.status);
        blob = await res.blob();
      } catch (directErr) {
        if (directErr.name === 'AbortError') throw directErr;
        let lastErr = directErr;
        for (const wrap of PROXIES.slice(1)) {
          try {
            const res2 = await fetch(wrap(currentDownloadUrl), { signal });
            if (!res2.ok) throw new Error('status ' + res2.status);
            blob = await res2.blob();
            lastErr = null;
            break;
          } catch (e2) {
            if (e2.name === 'AbortError') throw e2;
            lastErr = e2;
          }
        }
        if (lastErr) throw lastErr;
      }

      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = currentTrackName + '.mp3';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
    } catch (err) {
      if (err.name === 'AbortError') {
        statusMsg.textContent = "Unduhan dibatalkan.";
      } else {
        statusMsg.textContent = "Gagal mengunduh: " + err.message + ". Silakan coba buka tautan secara manual.";
      }
    } finally {
      dlLink.textContent = originalText;
      cancelBtn.style.display = 'none';
      currentAbortController = null;
    }
    return false;
  }

  function cancelDownload() {
    if (currentAbortController) currentAbortController.abort();
  }


</script>

</body>
</html>
