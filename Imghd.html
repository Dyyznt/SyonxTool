<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upscaler Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505; --surface:#0c0c0c; --border:rgba(255,255,255,0.09);
    --text:#f2f2f0; --text-dim:#8b8b88;
    --mono:'JetBrains Mono',monospace; --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
  .streak{position:fixed;border-radius:50%;background:radial-gradient(ellipse at center,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0) 70%);filter:blur(40px);pointer-events:none;z-index:0;}
  .streak.s1{width:800px;height:120px;top:-50px;left:-260px;transform:rotate(18deg);animation:drift1 26s ease-in-out infinite;}
  .streak.s2{width:600px;height:90px;bottom:6%;right:-240px;transform:rotate(-20deg);animation:drift2 30s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0) rotate(18deg);}50%{transform:translate(50px,30px) rotate(22deg);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) rotate(-20deg);}50%{transform:translate(-40px,-20px) rotate(-16deg);}}
  main{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 18px 48px;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .back{font-family:var(--mono);font-size:12px;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:7px 11px;}
  .back:active{border-color:rgba(255,255,255,0.25);}
  h1{font-family:var(--serif);font-weight:500;font-size:24px;margin-bottom:4px;}
  .sub{font-size:13px;color:var(--text-dim);margin-bottom:22px;}
  .form-group{margin-bottom:20px;}
  label{display:block;font-family:var(--mono);font-size:12px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.03em;}
  input[type="text"],input[type="file"]{width:100%;padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-family:var(--sans);}
  input[type="text"]:focus,input[type="file"]:focus{outline:none;border-color:rgba(255,255,255,0.35);}
  input[type="file"]::file-selector-button{background:var(--text);color:#000;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;margin-right:10px;}
  .thumbnail-preview{width:100%;max-height:200px;border-radius:10px;border:1px solid var(--border);margin-top:10px;object-fit:contain;background:#111;}
  .file-info{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:6px;}
  .file-info.error{color:#ff4444;}
  button{width:100%;margin-top:14px;padding:15px;border:1px solid var(--text);border-radius:10px;background:var(--text);color:#000;font-size:14px;font-family:var(--mono);letter-spacing:0.04em;text-transform:uppercase;font-weight:600;cursor:pointer;}
  button:active{opacity:0.8;}
  button:disabled{opacity:0.5;cursor:not-allowed;}
  .error-msg{color:#ff4444;font-family:var(--mono);font-size:12px;margin-top:6px;display:none;}
  input.error,input[type="file"].error{border-color:#ff4444!important;background:rgba(255,68,68,0.06);}
  input.error:focus,input[type="file"].error:focus{border-color:#ff4444!important;}
  .download-link{display:none;text-align:center;margin-top:10px;font-family:var(--mono);font-size:12px;color:var(--text);text-decoration:underline;}
</style>
</head>
<body>

  <div class="streak s1"></div>
  <div class="streak s2"></div>

  <main>
    <div class="topbar"><a class="back" onclick="location.replace('index.html')">⇱ kembali</a></div>
    <h1>Photo Upscaler</h1>
    <p class="sub">Upscale images to high resolution.</p>

    <div class="form-group">
      <label for="thumbnailInput">Insert photo ↓</label>
      <input type="file" id="thumbnailInput" accept="image/*">
      <img id="thumbPreview" class="thumbnail-preview" style="display:none;">
      <div class="file-info" id="fileInfo"></div>
      <div class="error-msg" id="thumbError">Harus ada foto</div>
      <a id="downloadLink" class="download-link" target="_blank">⇩ Download hasil HD</a>
    </div>

    <button id="generateBtn">֍ Create HD image</button>
  </main>

<script>
  const thumbnailInput = document.getElementById('thumbnailInput');
  const thumbPreview = document.getElementById('thumbPreview');
  const fileInfo = document.getElementById('fileInfo');
  const thumbError = document.getElementById('thumbError');
  const downloadLink = document.getElementById('downloadLink');
  const generateBtn = document.getElementById('generateBtn');

  let selectedFile = null;

  thumbnailInput.addEventListener('change', () => {
    const file = thumbnailInput.files[0];
    thumbError.style.display = 'none';
    thumbnailInput.classList.remove('error');
    downloadLink.style.display = 'none';

    if (!file) {
      selectedFile = null;
      thumbPreview.style.display = 'none';
      fileInfo.textContent = '';
      return;
    }

    selectedFile = file;
    thumbPreview.src = URL.createObjectURL(file);
    thumbPreview.style.display = 'block';
    fileInfo.textContent = `${file.name} • ${(file.size / 1024).toFixed(1)} KB`;
    fileInfo.classList.remove('error');
  });

  async function uploadToCatbox(file) {
    const formData = new FormData();
    formData.append('reqtype', 'fileupload');
    formData.append('fileToUpload', file);

    const res = await fetch('https://catbox.moe/user/api.php', {
      method: 'POST',
      body: formData
    });

    if (!res.ok) throw new Error('Upload ke catbox gagal');
    const text = await res.text();
    if (!text.startsWith('https://')) throw new Error('Catbox nolak file ini');
    return text.trim();
  }

  async function upscaleImage(imageUrl) {
    const realEndpoint = `https://api.ikyyxd.my.id/tools/upscale?url=${encodeURIComponent(imageUrl)}`;
    const proxied = `/api/proxy?target=${encodeURIComponent(realEndpoint)}`;
    const res = await fetch(proxied);
    if (!res.ok) throw new Error('API upscale error (lewat proxy)');
    const data = await res.json();

    if (!data.status) throw new Error(data.message || 'Upscale gagal diproses');

    // Response asli: { status, result: { downloadUrl, allDownloadUrls, ... } }
    const resultUrl = data?.result?.downloadUrl || data?.result?.allDownloadUrls?.[0];
    if (!resultUrl) throw new Error('URL hasil tidak ditemukan di response');
    return resultUrl;
  }

  generateBtn.addEventListener('click', async () => {
    if (!selectedFile) {
      thumbnailInput.classList.add('error');
      thumbError.style.display = 'block';
      return;
    }

    generateBtn.disabled = true;
    const originalText = generateBtn.textContent;
    fileInfo.classList.remove('error');
    downloadLink.style.display = 'none';

    try {
      generateBtn.textContent = 'UPLOADING...';
      let catboxUrl;
      try {
        catboxUrl = await uploadToCatbox(selectedFile);
      } catch (e) {
        throw new Error('GAGAL DI STEP UPLOAD CATBOX: ' + e.message);
      }

      generateBtn.textContent = 'UPSCALING...';
      let resultUrl;
      try {
        resultUrl = await upscaleImage(catboxUrl);
      } catch (e) {
        throw new Error('GAGAL DI STEP PROXY/UPSCALE: ' + e.message);
      }

      console.log(resultUrl);

      thumbPreview.src = resultUrl;
      thumbPreview.style.display = 'block';
      fileInfo.textContent = 'HD image siap ↑';
      downloadLink.href = resultUrl;
      downloadLink.style.display = 'block';
    } catch (err) {
      console.error(err);
      fileInfo.textContent = err.message || 'Terjadi kesalahan';
      fileInfo.classList.add('error');
    } finally {
      generateBtn.disabled = false;
      generateBtn.textContent = originalText;
    }
  });
</script>
</body>
</html>
