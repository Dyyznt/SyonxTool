<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake DANA — Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505; --surface:#0c0c0c; --border:rgba(255,255,255,0.09);
    --text:#f2f2f0; --text-dim:#8b8b88;
    --mono:'JetBrains Mono',monospace; --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh; -webkit-tap-highlight-color: transparent;}
  .streak{position:fixed;border-radius:50%;background:radial-gradient(ellipse at center,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0) 70%);filter:blur(40px);pointer-events:none;z-index:0;}
  .streak.s1{width:800px;height:120px;top:-50px;left:-260px;transform:rotate(18deg);animation:drift1 26s ease-in-out infinite;}
  .streak.s2{width:600px;height:90px;bottom:6%;right:-240px;transform:rotate(-20deg);animation:drift2 30s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0) rotate(18deg);}50%{transform:translate(50px,30px) rotate(22deg);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) rotate(-20deg);}50%{transform:translate(-40px,-20px) rotate(-16deg);}}
  main{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 18px 48px;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .back{font-family:var(--mono);font-size:12px;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:7px 11px;}
  .back:active{border-color:rgba(255,255,255,0.25);}
  h1{font-family:var(--serif);font-weight:500;font-size:24px;margin-bottom:4px;}
  .sub{font-size:13px;color:var(--text-dim);margin-bottom:22px;}
  #canvasWrap{width:100%;border-radius:14px;overflow:hidden;border:1px solid var(--border);position:relative;}
  canvas{width:100%;display:block;background:#0a0a0a;aspect-ratio:auto;}
  .controls{margin-top:18px;}
  .fake-input-group{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px 4px 4px 14px;margin-bottom:10px;}
  .fake-input-group label{color:var(--text-dim);font-family:var(--mono);font-size:13px;}
  .fake-input-group input{flex:1;background:transparent;border:none;color:var(--text);font-size:16px;font-family:var(--sans);padding:10px 0;outline:none;}
  .fake-input-group input::placeholder{color:var(--text-dim);}
  .btn-fake{width:100%;padding:13px;border:none;border-radius:10px;background:var(--text);color:#000;font-family:var(--mono);font-weight:600;font-size:14px;cursor:pointer;transition:opacity 0.15s;margin-bottom:8px;}
  .btn-fake:active{opacity:0.7;}
  .btn-fake:disabled{opacity:0.4;pointer-events:none;}
  .status-msg{font-size:13px;color:var(--text-dim);text-align:center;margin:8px 0;font-family:var(--mono);min-height:20px;}
  button#dl{width:100%;margin-top:4px;padding:15px;border:1px solid var(--text);border-radius:10px;background:var(--text);color:#000;font-size:14px;font-family:var(--mono);letter-spacing:0.04em;text-transform:uppercase;font-weight:600;cursor:pointer;}
  button#dl:active{opacity:0.8;}
</style>
</head>
<body>

  <div class="streak s1"></div>
  <div class="streak s2"></div>

  <main>
    <div class="topbar"><a class="back" onclick="location.replace('index.html')">⇱ kembali</a></div>
    <h1>Fake DANA</h1>
    <p class="sub">Generate saldo DANA sesuai keinginan.</p>

    <div id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
      <div class="fake-input-group">
        <label>Rp</label>
        <input type="text" id="fakeAmount" placeholder="10000" value="10000">
      </div>
      <button class="btn-fake" id="genFakeBtn">֍ Generate</button>
      <div class="status-msg" id="statusMsg">Press generate to start</div>
      <button id="dl">⤓ Download Image</button>
    </div>
  </main>

<script>
// ====================================================
// KONFIGURASI — GANTI URL THUMBNAIL DI SINI
// ====================================================
const THUMBNAIL_URL = "https://raw.githubusercontent.com/Dyyznt/ThumbnailMy/main/1784370657720.jpg"; //Url Thumb
// ====================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fakeInput = document.getElementById('fakeAmount');
const genBtn = document.getElementById('genFakeBtn');
const statusMsg = document.getElementById('statusMsg');
const dlBtn = document.getElementById('dl');

let currentImageData = null;
let thumbnailLoaded = false;

// Muat thumbnail
const thumbImg = new Image();
thumbImg.crossOrigin = "Anonymous";
thumbImg.src = THUMBNAIL_URL;

thumbImg.onload = function() {
  canvas.width = thumbImg.naturalWidth;
  canvas.height = thumbImg.naturalHeight;
  ctx.drawImage(thumbImg, 0, 0);
  thumbnailLoaded = true;
  backupCanvas();
  statusMsg.textContent = "Press Generate to Begin";
};

thumbImg.onerror = function() {
  canvas.width = 720;
  canvas.height = 1280;
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ffffff";
  ctx.font = "20px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Gagal muat thumbnail", canvas.width/2, canvas.height/2);
  thumbnailLoaded = true;
  backupCanvas();
  statusMsg.textContent = "⚠️ Thumbnail gagal";
};

function backupCanvas() {
  currentImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
}

function restoreCanvas() {
  if (currentImageData) {
    ctx.putImageData(currentImageData, 0, 0);
  }
}

// 🔥 GENERATE — BERSIHIN INPUT
async function generateFake() {
  if (!thumbnailLoaded) {
    statusMsg.textContent = "↺ Tunggu thumbnail selesai muat...";
    return;
  }

  // Ambil angka mentah (hapus semua kecuali 0-9)
  let raw = fakeInput.value.replace(/[^0-9]/g, "");
  if (!raw) raw = "0";

  // Format buat ditampilkan di status
  const displayAmount = Number(raw).toLocaleString("id-ID");

  genBtn.disabled = true;
  genBtn.textContent = "𐇵 Generating...";
  statusMsg.textContent = "↺ Process...";
  statusMsg.style.color = "var(--text-dim)";

  try {
    backupCanvas();

    // Kirim angka mentah (tanpa titik/koma)
    const url = `https://api.ikyyxd.my.id/canvas/fakedana?amount=${raw}`;
    const res = await fetch(url);

    if (!res.ok) {
      // Coba baca pesan error dari response
      let errMsg = `HTTP ${res.status}`;
      try {
        const errText = await res.text();
        if (errText) errMsg += ` - ${errText}`;
      } catch(e) {}
      throw new Error(errMsg);
    }

    const blob = await res.blob();
    const img = new Image();
    const objectURL = URL.createObjectURL(blob);

    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(objectURL);

      statusMsg.textContent = `Generate Rp${displayAmount} Successful!`;
      statusMsg.style.color = "#4caf50";
      genBtn.disabled = false;
      genBtn.textContent = "֍ Generate";
      backupCanvas();
    };

    img.onerror = () => {
      restoreCanvas();
      throw new Error("꩜ Generation Failed!");
    };

    img.src = objectURL;

  } catch (err) {
    console.error(err);
    restoreCanvas();
    statusMsg.textContent = `꩜ Failed!: ${err.message}`;
    statusMsg.style.color = "#ef5350";
    genBtn.disabled = false;
    genBtn.textContent = "֍ Generate";
  }
}

genBtn.addEventListener('click', generateFake);

dlBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'fakedana_' + Date.now() + '.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.95);
  link.click();
});
</script>
</body>
</html>
