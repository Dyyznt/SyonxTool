<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skip Link SFL — ToolBase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505; --surface:#0c0c0c; --border:rgba(255,255,255,0.09);
    --text:#f2f2f0; --text-dim:#8b8b88;
    --mono:'JetBrains Mono',monospace; --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
  .streak{position:fixed;border-radius:50%;background:radial-gradient(ellipse at center,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0) 70%);filter:blur(40px);pointer-events:none;z-index:0;}
  .streak.s1{width:800px;height:120px;top:-50px;left:-260px;transform:rotate(18deg);animation:drift1 26s ease-in-out infinite;}
  .streak.s2{width:600px;height:90px;bottom:6%;right:-240px;transform:rotate(-20deg);animation:drift2 30s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0) rotate(18deg);}50%{transform:translate(50px,30px) rotate(22deg);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) rotate(-20deg);}50%{transform:translate(-40px,-20px) rotate(-16deg);}}
  main{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 18px 48px;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .back{font-family:var(--mono);font-size:12px;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:7px 11px;}
  .back:active{border-color:rgba(255,255,255,0.25);}
  h1{font-family:var(--serif);font-weight:500;font-size:24px;margin-bottom:4px;}
  .sub{font-size:13px;color:var(--text-dim);margin-bottom:22px;}

  .controls{margin-top:4px;}
  input#urlInput{width:100%;padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:var(--mono);}
  input#urlInput:focus{outline:none;border-color:rgba(255,255,255,0.35);}
  button#skipBtn{width:100%;margin-top:14px;padding:15px;border:1px solid var(--text);border-radius:10px;background:var(--text);color:#000;font-size:14px;font-family:var(--mono);letter-spacing:0.04em;text-transform:uppercase;font-weight:600;cursor:pointer;}
  button#skipBtn:active{opacity:0.8;}
  button#skipBtn:disabled{opacity:0.5;cursor:not-allowed;}

  .statusText{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:10px;letter-spacing:0.03em;min-height:14px;}
  .statusText.error{color:#ff6b6b;}

  .result{display:none;margin-top:18px;border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--surface);}
  .result.show{display:block;}
  .result-label{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
  .result-url{font-family:var(--mono);font-size:12.5px;word-break:break-all;line-height:1.5;margin-bottom:14px;}
  .result-actions{display:flex;gap:10px;}
  .result-actions button{flex:1;padding:12px;border-radius:10px;font-family:var(--mono);font-size:12px;letter-spacing:0.03em;text-transform:uppercase;font-weight:600;cursor:pointer;}
  .btn-copy{border:1px solid var(--text);background:var(--text);color:#000;}
  .btn-copy:active{opacity:0.8;}
  .btn-open{border:1px solid var(--border);background:transparent;color:var(--text);}
  .btn-open:active{border-color:rgba(255,255,255,0.25);}
</style>
</head>
<body>

  <div class="streak s1"></div>
  <div class="streak s2"></div>

  <main>
    <div class="topbar"><a class="back" onclick="location.replace('index.html')">⇱ kembali</a></div>
    <h1>Skip Link SFL</h1>
    <p class="sub">Paste link sfl.gl, dapetin link asli tanpa lewat halaman skip/ads.</p>

    <div class="controls">
      <input type="text" id="urlInput" placeholder="https://sfl.gl/xxxxxxx">
      <button id="skipBtn">Skip Link</button>
      <div class="statusText" id="statusText"></div>
    </div>

    <div class="result" id="resultBox">
      <div class="result-label">Link Asli</div>
      <div class="result-url" id="resultUrl"></div>
      <div class="result-actions">
        <button class="btn-copy" id="copyBtn">Copy</button>
        <button class="btn-open" id="openBtn">Buka</button>
      </div>
    </div>
  </main>

<script>
  let currentUrl = "";
  const urlInput = document.getElementById('urlInput');
  const skipBtn = document.getElementById('skipBtn');
  const statusText = document.getElementById('statusText');
  const resultBox = document.getElementById('resultBox');
  const resultUrl = document.getElementById('resultUrl');

  skipBtn.addEventListener('click', async () => {
    const input = urlInput.value.trim();
    statusText.classList.remove('error');
    resultBox.classList.remove('show');

    if (!input) {
      statusText.textContent = "Masukin link sfl.gl dulu.";
      statusText.classList.add('error');
      return;
    }

    skipBtn.disabled = true;
    statusText.textContent = "Memproses...";

    try {
      const apiUrl = "https://api.ikyyxd.my.id/tools/skiplink/sfl?url=" + encodeURIComponent(input);
      const res = await fetch(apiUrl);
      const data = await res.json();

      if (data.status && data.result && data.result.destinationUrl) {
        currentUrl = data.result.destinationUrl;
        resultUrl.textContent = currentUrl;
        resultBox.classList.add('show');
        statusText.textContent = data.result.message || "Berhasil.";
      } else {
        statusText.textContent = "Gagal ambil link. Coba cek lagi link-nya.";
        statusText.classList.add('error');
      }
    } catch (err) {
      statusText.textContent = "Error: " + err.message;
      statusText.classList.add('error');
    } finally {
      skipBtn.disabled = false;
    }
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl);
    statusText.textContent = "Link ke-copy.";
    statusText.classList.remove('error');
  });

  document.getElementById('openBtn').addEventListener('click', () => {
    if (!currentUrl) return;
    window.open(currentUrl, '_blank');
  });
</script>
</body>
</html>
